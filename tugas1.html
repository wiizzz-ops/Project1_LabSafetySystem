<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Aplikasi Konversi Nilai</title>
    <style>
    body {
        font-family: Arial;
        padding: 20px;
    }
    input {
        padding: 5px;
    }
    button {
        margin: 3px;
        padding: 5px 10px;
    }
</style>
</head>
<body>

    <h2>Aplikasi Konversi Nilai</h2>

    Nilai: 
    <input type="number" id="nilai">
    <button onclick="konversi()">Konversi</button>

    <p id="hasil"></p>

    <script>
        function konversi() {
            let nilai = document.getElementById("nilai").value;
            let grade = "";

            if (nilai >= 0 && nilai <= 20) {
                grade = "E";
            } else if (nilai <= 40) {
                grade = "D";
            } else if (nilai <= 60) {
                grade = "C";
            } else if (nilai <= 80) {
                grade = "B";
            } else if (nilai <= 100) {
                grade = "A";
            } else {
                grade = "Nilai tidak valid";
            }

            document.getElementById("hasil").innerHTML = 
                "Hasil Konversi: " + grade;
        }
    </script>

</body>
</html>
